<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héctor Hurtado | Desarrollador</title>

  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background: #e8dcc2;
      color: #1a1a1a;
    }

    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #f6ead2;
      border: 5px solid #111;
      box-shadow: 12px 12px 0 #111;
      padding: 40px;
      max-width: 650px;
      text-align: center;
    }

    .tag {
      display: inline-block;
      background: #111;
      color: #f6ead2;
      padding: 8px 14px;
      margin-bottom: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    h1 {
      font-size: 48px;
      margin: 10px 0;
      text-transform: uppercase;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #7a3e1d;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    button {
      margin-top: 25px;
      padding: 14px 24px;
      background: #c94c2f;
      color: white;
      border: 4px solid #111;
      font-family: "Courier New", monospace;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 6px 6px 0 #111;
    }

    button:hover {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 #111;
    }

    #mensaje {
      margin-top: 25px;
      font-weight: bold;
      color: #7a3e1d;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <span class="tag">PORTAFOLIO VINTAGE</span>

    <h1>Héctor Hurtado</h1>
    <h2>Desarrollador Web</h2>

    <p>
      Soy el desarrollador <strong>Héctor Hurtado</strong>, apasionado por crear
      páginas web funcionales, creativas y con personalidad visual.
    </p>

    <button onclick="mostrarMensaje()">Conóceme más</button>

    <p id="mensaje"></p>
  </div>
</div>

<script>
function mostrarMensaje() {
  document.getElementById("mensaje").textContent =
  "Diseño con estilo vintage, brutalista y mucha actitud.";
}
</script>

</body>
</html>
